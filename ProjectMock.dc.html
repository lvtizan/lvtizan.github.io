<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative;width:100%;height:100%;overflow:hidden;background:#0d0d10;font-family:'Space Grotesk','Noto Sans SC',sans-serif;">

  <sc-if value="{{ isApp }}" hint-placeholder-val="{{ false }}">
  <div style="position:absolute;inset:0;overflow:hidden;background:#160f24;">
    <img src="uploads/avatar-showcase.png" alt="AVATAR AI 角色陪伴 App — 世界探索/角色发现/详情/聊天/精选界面" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:block;" />
  </div>
  </sc-if>

  <sc-if value="{{ isWeb }}" hint-placeholder-val="{{ false }}">
  <div style="position:absolute;inset:0;overflow:hidden;background:radial-gradient(120% 115% at 50% -6%,#2a2318,#171208 50%,#0a0805);">
    <div style="position:absolute;width:68%;height:72%;left:16%;top:12%;background:radial-gradient(closest-side,rgba(212,162,92,.22),transparent 70%);filter:blur(32px);pointer-events:none;z-index:0;"></div>
    <div style="position:absolute;left:33%;top:32%;width:54%;transform:translate(-50%,-50%) rotate(-3deg);z-index:1;border-radius:8px;overflow:hidden;box-shadow:0 24px 52px rgba(0,0,0,.5);border:1px solid #2a2620;">
      <div style="display:flex;align-items:center;gap:5px;padding:5px 9px;background:#1a1712;"><span style="width:6px;height:6px;border-radius:50%;background:#3a352c;"></span><span style="width:6px;height:6px;border-radius:50%;background:#3a352c;"></span><span style="width:6px;height:6px;border-radius:50%;background:#3a352c;"></span></div>
      <div style="position:relative;aspect-ratio:16/10;background:#0c0c10;"><img src="uploads/tarmeer-companies.png" alt="Tarmeer 装企查找与筛选" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;" /><div style="position:absolute;inset:0;background:rgba(10,8,5,.36);"></div></div>
    </div>
    <div style="position:absolute;left:67%;top:32%;width:54%;transform:translate(-50%,-50%) rotate(3deg);z-index:1;border-radius:8px;overflow:hidden;box-shadow:0 24px 52px rgba(0,0,0,.5);border:1px solid #2a2620;">
      <div style="display:flex;align-items:center;gap:5px;padding:5px 9px;background:#1a1712;"><span style="width:6px;height:6px;border-radius:50%;background:#3a352c;"></span><span style="width:6px;height:6px;border-radius:50%;background:#3a352c;"></span><span style="width:6px;height:6px;border-radius:50%;background:#3a352c;"></span></div>
      <div style="position:relative;aspect-ratio:16/10;background:#0c0c10;"><img src="uploads/tarmeer-company.png" alt="Tarmeer 装企详情与作品集" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;" /><div style="position:absolute;inset:0;background:rgba(10,8,5,.36);"></div></div>
    </div>
    <div style="position:absolute;left:50%;top:57%;width:66%;transform:translate(-50%,-50%);z-index:3;border-radius:clamp(7px,1vw,11px);overflow:hidden;box-shadow:0 46px 92px rgba(0,0,0,.72),0 0 66px rgba(212,162,92,.14);border:1px solid #35302a;">
      <div style="display:flex;align-items:center;gap:6px;padding:7px 12px;background:#201b14;"><span style="width:8px;height:8px;border-radius:50%;background:#4a4436;"></span><span style="width:8px;height:8px;border-radius:50%;background:#4a4436;"></span><span style="width:8px;height:8px;border-radius:50%;background:#4a4436;"></span><span style="flex:1;margin-left:8px;max-width:58%;height:14px;border-radius:7px;background:#0e0b07;"></span></div>
      <div style="position:relative;aspect-ratio:16/10;background:#0c0c10;"><img src="uploads/tarmeer-home.png" alt="Tarmeer 首页 · 业主入口" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;" /></div>
    </div>
  </div>
  </sc-if>

  <sc-if value="{{ isOilfield }}" hint-placeholder-val="{{ false }}">
  <div style="position:absolute;inset:0;background:#0d0d10;overflow:hidden;">
    <img src="uploads/oilfield-web-home.png" alt="KST POWER 石油钻采与动力装备中英双语外贸站首页" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;" />
  </div>
  </sc-if>

  <sc-if value="{{ isNanhai }}" hint-placeholder-val="{{ false }}">
  <div style="position:absolute;inset:0;background:#efe6d0;overflow:hidden;">
    <img src="uploads/nanhai-banner3.png" alt="南海风物 · 诗词科举主视觉" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;" />
  </div>
  </sc-if>

  <sc-if value="{{ isScope }}" hint-placeholder-val="{{ false }}">
  <div style="position:absolute;inset:0;background:#0b0b0e;overflow:hidden;">
    <img src="uploads/veinscope-onsite1.png" alt="工业内窥镜现场检测" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 42%;" />
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(13,13,16,.28) 0%,rgba(13,13,16,0) 30%,rgba(13,13,16,.55) 100%);"></div>
    <span style="position:absolute;top:16px;left:18px;display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;color:#f2f2f0;background:rgba(13,13,16,.5);padding:5px 9px;border-radius:5px;backdrop-filter:blur(4px);"><span style="width:7px;height:7px;border-radius:50%;background:var(--acc,#e8fe5c);"></span>ON-SITE INSPECTION</span>
  </div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:720,&quot;height&quot;:315},&quot;kind&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;avatar&quot;,&quot;meridian&quot;,&quot;veinscope&quot;],&quot;default&quot;:&quot;meridian&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const k = (this.props.kind || 'meridian').toLowerCase();
    return {
      isApp: k === 'avatar' || k === 'flowtime' || k === 'app',
      isWeb: k === 'tarmeer' || k === 'meridian' || k === 'web',
      isScope: k === 'veinscope' || k === 'scope',
      isNanhai: k === 'nanhai',
      isOilfield: k === 'oilfield'
    };
  }
}
</script>
</body>
</html>
