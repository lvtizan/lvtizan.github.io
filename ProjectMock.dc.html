<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative;width:100%;height:100%;overflow:hidden;background:#0d0d10;font-family:'Space Grotesk','Noto Sans SC',sans-serif;">

  <sc-if value="{{ isApp }}" hint-placeholder-val="{{ false }}">
  <div style="position:absolute;inset:0;overflow:hidden;background:radial-gradient(120% 120% at 50% -8%,#2c2142,#170f26 52%,#07060d);display:flex;align-items:center;justify-content:center;perspective:1400px;perspective-origin:50% 42%;">
    <div style="position:absolute;width:64%;height:78%;left:18%;top:8%;background:radial-gradient(closest-side,rgba(158,96,255,.32),rgba(232,254,92,.05) 46%,transparent 72%);filter:blur(26px);pointer-events:none;z-index:0;"></div>
    <div style="position:relative;height:76%;aspect-ratio:9/19.5;background:#111116;border:clamp(3px,0.5vw,5px) solid #2a2436;border-radius:clamp(9px,2.3vw,26px);overflow:hidden;box-shadow:0 30px 64px rgba(0,0,0,.6);transform:translateX(38%) rotateY(34deg) rotate(-1.5deg);transform-style:preserve-3d;z-index:1;">
      <img src="uploads/avatar-home.png" alt="AVATAR discovery" style="width:100%;height:100%;object-fit:cover;object-position:top center;display:block;" />
    </div>
    <div style="position:relative;height:99%;aspect-ratio:9/19.5;background:#111116;border:clamp(3px,0.6vw,6px) solid #34303f;border-radius:clamp(10px,2.7vw,30px);overflow:hidden;box-shadow:0 46px 92px rgba(0,0,0,.74),0 0 78px rgba(158,96,255,.2);transform:translateY(-2%) scale(1.04);z-index:3;">
      <img src="uploads/avatar-home2.png" alt="AVATAR home" style="width:100%;height:100%;object-fit:cover;object-position:top center;display:block;" />
    </div>
    <div style="position:relative;height:76%;aspect-ratio:9/19.5;background:#111116;border:clamp(3px,0.5vw,5px) solid #2a2436;border-radius:clamp(9px,2.3vw,26px);overflow:hidden;box-shadow:0 30px 64px rgba(0,0,0,.6);transform:translateX(-38%) rotateY(-34deg) rotate(1.5deg);transform-style:preserve-3d;z-index:1;">
      <img src="uploads/avatar-chat.png" alt="AVATAR chat" style="width:100%;height:100%;object-fit:cover;object-position:top center;display:block;" />
    </div>
  </div>
  </sc-if>

  <sc-if value="{{ isWeb }}" hint-placeholder-val="{{ false }}">
  <div style="position:absolute;inset:0;background:radial-gradient(120% 110% at 50% -10%,#211d16,#0b0b0e 72%);display:flex;align-items:center;justify-content:center;padding:8% 9%;">
    <div style="width:100%;max-width:940px;">
      <div style="background:linear-gradient(180deg,#2a2a2f,#161619);border-radius:22px 22px 6px 6px;padding:0.9%;box-shadow:0 40px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.05) inset;">
        <div style="position:relative;background:#050506;border-radius:15px;padding:1.5%;">
          <div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:15%;max-width:130px;height:52%;max-height:16px;background:#050506;border-radius:0 0 9px 9px;z-index:2;display:flex;align-items:center;justify-content:center;"><span style="width:4px;height:4px;border-radius:50%;background:#1c1c22;"></span></div>
          <div style="position:relative;aspect-ratio:16/10;border-radius:7px;overflow:hidden;background:#0c0c10;">
            <img src="uploads/tarmeer-home.png" alt="Tarmeer 首页" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;display:block;" />
          </div>
        </div>
      </div>
      <div style="position:relative;height:clamp(9px,1.5vw,18px);margin:0 -7%;background:linear-gradient(180deg,#c2c6cc,#9a9ea6 55%,#75787f);border-radius:0 0 12px 12px;box-shadow:0 22px 34px rgba(0,0,0,.5);">
        <div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:15%;height:40%;background:#83868d;border-radius:0 0 7px 7px;"></div>
      </div>
    </div>
  </div>
  </sc-if>

  <sc-if value="{{ isOilfield }}" hint-placeholder-val="{{ false }}">
  <div style="position:absolute;inset:0;background:#0d0d10;overflow:hidden;">
    <img src="uploads/oilfield-web-home.png" alt="KST POWER 石油钻采与动力装备中英双语外贸站首页" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;" />
  </div>
  </sc-if>

  <sc-if value="{{ isNanhai }}" hint-placeholder-val="{{ false }}">
  <div style="position:absolute;inset:0;background:#efe6d0;overflow:hidden;">
    <img src="uploads/nanhai-banner3.png" alt="南海风物 · 诗词科举主视觉" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;" />
  </div>
  </sc-if>

  <sc-if value="{{ isScope }}" hint-placeholder-val="{{ false }}">
  <div style="position:absolute;inset:0;background:#0b0b0e;overflow:hidden;">
    <img src="uploads/veinscope-onsite1.png" alt="工业内窥镜现场检测" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 42%;" />
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(13,13,16,.28) 0%,rgba(13,13,16,0) 30%,rgba(13,13,16,.55) 100%);"></div>
    <span style="position:absolute;top:16px;left:18px;display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;color:#f2f2f0;background:rgba(13,13,16,.5);padding:5px 9px;border-radius:5px;backdrop-filter:blur(4px);"><span style="width:7px;height:7px;border-radius:50%;background:var(--acc,#e8fe5c);"></span>ON-SITE INSPECTION</span>
  </div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:720,&quot;height&quot;:315},&quot;kind&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;avatar&quot;,&quot;meridian&quot;,&quot;veinscope&quot;],&quot;default&quot;:&quot;meridian&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const k = (this.props.kind || 'meridian').toLowerCase();
    return {
      isApp: k === 'avatar' || k === 'flowtime' || k === 'app',
      isWeb: k === 'tarmeer' || k === 'meridian' || k === 'web',
      isScope: k === 'veinscope' || k === 'scope',
      isNanhai: k === 'nanhai',
      isOilfield: k === 'oilfield'
    };
  }
}
</script>
</body>
</html>
